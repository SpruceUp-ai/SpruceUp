[project]
name = "spruce-up"
version = "0.1.0"
description = ""
authors = [
    {name = "Caleb P"}
]
requires-python = ">=3.14"
dependencies = [
    "psycopg (>=3.3.4,<4.0.0)",
    "tenacity (>=9.1.4,<10.0.0)",
    "openai (>=2.37.0,<3.0.0)",
    "dotenv (>=0.9.9,<0.10.0)",
    "watchfiles (>=1.0.0)"
]

[project.scripts]
spruceup = "spruceup.cli:main"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.3,<10.0.0)"
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.pyright]
pythonVersion = "3.14"
extraPaths = ["."]
